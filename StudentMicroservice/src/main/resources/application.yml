spring:
  application:
    name: StudentMicroservice

  web:
    error:
      whitelabel:
        enabled: false

  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:mysql://localhost:3306/sales
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root@39
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      default-zone: http://localhost:8761/eureka/

server:
  port: 2222