<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:th="https://www.thymeleaf.org"
	xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head>

<title>Hello World!</title>
</head>

<body>
	<div align="center">
			<div sec:authorize="isAuthenticated()">
				Welcome <b><span sec:authentication="name">Username</span></b>
				&nbsp;
				<i><span sec:authentication="principal.authorities"></span></i>
			</div>
			<form th:action="@{/logout}" method="post">
				<input type="submit" value="logout" />
			</form>
			<h1> AUTHORITY | ACCESS</h1>
		
		
		<div sec:authorize = "hasAnyAuthority('ROLE_USER','ROLE_ADMIN')">
		<a href = "user/read"> Read User Data</a><br><br>
		</div>

		<div sec:authorize = "hasAuthority('ROLE_ADMIN')">
		<a href = "delete">Delete User Data</a><br><br>
		<a href = "update">Update User Data</a><br><br>
		</div>
		
		<div sec:authorize = "hasAnyAuthority('ROLE_HR','ROLE_EMPLOYEE')">
		<a href = "user/hr/onboard"> HR | EMPLOYEE </a><br><br>
		</div>
		</div>
</body>
<html>
